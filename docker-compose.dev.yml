version: '3.9'

services:
  web:
    image: node:20-alpine
    working_dir: /app
    command: npm run dev
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  server:
    image: node:20-alpine
    working_dir: /app
    command: npm run dev
    ports:
      - '4000:4000'
    volumes:
      - ./apps/server:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

networks:
  default:
    name: morpho-network
